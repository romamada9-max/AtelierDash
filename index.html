<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أتيليه احمد حمزة - إدارة العملاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #d4af37; /* لون ذهبي للأتيليه */
            --bg-color: #f4f7f6;
            --success: #27ae60;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }

        /* العنوان */
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-color);
        }

        .header h1 {
            font-size: 2.5rem;
            border-bottom: 3px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 10px;
        }

        /* أدوات البحث والفلترة */
        .controls {
            max-width: 900px;
            margin: 0 auto 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .search-box {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 25px;
            border: 2px solid #ddd;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .search-box:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .filters {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            background: white;
            color: var(--primary-color);
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--accent-color);
            color: white;
        }

        /* شبكة الكروت */
        .customers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; right: 0;
            width: 5px; height: 100%;
            background: var(--accent-color);
        }

        .card h3 {
            margin: 0 0 15px 0;
            color: var(--primary-color);
            font-size: 1.4rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .label { color: #7f8c8d; }
        .value { font-weight: bold; color: #2c3e50; }

        .price-total { border-top: 1px solid #eee; pt: 10px; margin-top: 10px; }
        .paid { color: var(--success); }
        .remaining { color: var(--danger); }

        .btn-details {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: var(--primary-color);
            color: white;
            cursor: pointer;
            font-family: 'Cairo';
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>👑 أتيليه الملكة</h1>
    </div>

    <div class="controls">
        <input type="text" class="search-box" id="searchInput" placeholder="ابحث باسم العميل أو رقم الهاتف...">
        
        <div class="filters">
            <button class="filter-btn active" onclick="filterData('all')">كل العملاء</button>
            <button class="filter-btn" onclick="filterData('today')">تسليمات اليوم</button>
            <button class="filter-btn" onclick="filterData('week')">تسليمات الأسبوع</button>
        </div>
    </div>

    <div class="customers-grid" id="customersContainer">
        </div>

    <script>
        // بيانات تجريبية (سيتم استبدالها ببيانات من قاعدة البيانات لاحقاً)
        const customers = [
            { id: 1, name: "سارة أحمد", date: "2026-03-04", total: 5000, paid: 3000, phone: "01012345678" },
            { id: 2, name: "منى محمد", date: "2026-03-10", total: 7000, paid: 7000, phone: "01287654321" },
            { id: 3, name: "ليلى محمود", date: "2026-03-05", total: 4500, paid: 1000, phone: "01122334455" }
        ];

        function renderCards(data) {
            const container = document.getElementById('customersContainer');
            container.innerHTML = '';

            data.forEach(c => {
                const remaining = c.total - c.paid;
                container.innerHTML += `
                    <div class="card">
                        <h3>${c.name}</h3>
                        <div class="info-row">
                            <span class="label">📅 تاريخ الاستلام:</span>
                            <span class="value">${c.date}</span>
                        </div>
                        <div class="info-row price-total">
                            <span class="label">💰 تمن الفستان:</span>
                            <span class="value">${c.total} ج.م</span>
                        </div>
                        <div class="info-row">
                            <span class="label">✅ المدفوع:</span>
                            <span class="value paid">${c.paid} ج.م</span>
                        </div>
                        <div class="info-row">
                            <span class="label">🛑 المتبقي:</span>
                            <span class="value remaining">${remaining} ج.م</span>
                        </div>
                        <button class="btn-details" onclick="alert('فتح تفاصيل: ${c.name}')">عرض التفاصيل</button>
                    </div>
                `;
            });
        }

        // تشغيل البحث
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = customers.filter(c => c.name.includes(term) || c.phone.includes(term));
            renderCards(filtered);
        });

        // تشغيل الفلاتر (مثال مبسط)
        function filterData(type) {
            // هنا تضع منطق التاريخ الحقيقي
            alert("تم اختيار فلتر: " + type);
        }

        // العرض الأولي
        renderCards(customers);
    </script>
</body>
</html>

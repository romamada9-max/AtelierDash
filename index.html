<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة أتيليه احمد حمزة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --main-color: #d81b60; --bg-color: #fce4ec; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; }
        .header { background: var(--main-color); color: white; padding: 20px; text-align: center; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-right: 5px solid var(--main-color); }
        .customer-name { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .detail { font-size: 14px; color: #666; margin: 3px 0; }
        .amount { color: #e91e63; font-weight: bold; font-size: 16px; }
        .date { color: #2e7d32; font-weight: bold; }
        .loading { text-align: center; color: var(--main-color); font-weight: bold; margin-top: 50px; }
        #stats { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .stat-box { background: white; padding: 10px; border-radius: 10px; text-align: center; width: 45%; font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>لوحة تحكم الأتيليه 👗</h1>
        <p>متابعة العملاء والمواعيد</p>
    </div>

    <div id="stats">
        <div class="stat-box">عدد العميلات: <br><span id="count">0</span></div>
        <div class="stat-box">إجمالي المتبقي: <br><span id="totalRem" style="color:red">0</span></div>
    </div>

    <div id="loading" class="loading">جاري جلب البيانات من السحابة...</div>
    <div id="customer-list"></div>

    <script>
        // --- إعدادات Firebase الخاصة بك ---
        const firebaseConfig = {
            databaseURL: "https://ateliersystem-3ed22-default-rtdb.firebaseio.com/"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // جلب البيانات من المسار الذي رفعنا عليه (LiveAtelier)
        const customersRef = db.ref('LiveAtelier');

        customersRef.on('value', (snapshot) => {
            const listContainer = document.getElementById('customer-list');
            const loading = document.getElementById('loading');
            const countSpan = document.getElementById('count');
            const totalRemSpan = document.getElementById('totalRem');
            
            listContainer.innerHTML = '';
            loading.style.display = 'none';
            
            let count = 0;
            let totalRemaining = 0;

            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    count++;
                    totalRemaining += parseFloat(data.Remaining || 0);

                    const card = `
                        <div class="card">
                            <div class="customer-name">${data.CustomerName}</div>
                            <div class="detail">📞 الهاتف: ${data.Phone}</div>
                            <div class="detail">💰 المتبقي: <span class="amount">${data.Remaining} ج.م</span></div>
                            <div class="detail">📅 موعد التسليم: <span class="date">${data.DeliveryDate}</span></div>
                        </div>
                    `;
                    listContainer.innerHTML += card;
                });
                
                countSpan.innerText = count;
                totalRemSpan.innerText = totalRemaining.toLocaleString() + " ج.م";
            } else {
                listContainer.innerHTML = '<p style="text-align:center">لا توجد بيانات حالياً</p>';
            }
        });
    </script>
</body>
</html>

<Window x:Class="AtelierPro.CustomersWindow"
        xmlns="http://schemas.microsoft.com/winfx/2006/xaml/presentation"
        xmlns:x="http://schemas.microsoft.com/winfx/2006/xaml"
        Title="إدارة العملاء - أتيليه الملكة" Height="700" Width="1000"
        WindowStartupLocation="CenterScreen" FlowDirection="RightToLeft" Background="#F0F2F5">
    
    <Grid>
        <Grid.RowDefinitions>
            <RowDefinition Height="Auto"/> <RowDefinition Height="Auto"/> <RowDefinition Height="*"/>    </Grid.RowDefinitions>

        <Border Grid.Row="0" Background="#34495E" Padding="15">
            <TextBlock Text="✨ أتيليه الملكة - إدارة الحجوزات ✨" 
                       Foreground="White" FontSize="26" FontWeight="Bold" 
                       HorizontalAlignment="Center" FontFamily="Segoe UI"/>
        </Border>

        <StackPanel Grid.Row="1" Margin="20,10">
            <Border Background="White" CornerRadius="20" Padding="10" Margin="0,0,0,15" BorderBrush="#DDD" BorderThickness="1">
                <Grid>
                    <Grid.ColumnDefinitions>
                        <ColumnDefinition Width="Auto"/>
                        <ColumnDefinition Width="*"/>
                    </Grid.ColumnDefinitions>
                    <TextBlock Grid.Column="0" Text="🔍" VerticalAlignment="Center" Margin="10,0"/>
                    <TextBox x:Name="TxtSearch" Grid.Column="1" BorderThickness="0" 
                             VerticalAlignment="Center" FontSize="16" 
                             TextChanged="TxtSearch_TextChanged" Tag="ابحث باسم العميل أو رقم الهاتف..."/>
                </Grid>
            </Border>

            <StackPanel Orientation="Horizontal" HorizontalAlignment="Center">
                <RadioButton Content="كل العملاء" x:Name="BtnAll" IsChecked="True" Style="{StaticResource {x:Type ToggleButton}}" Padding="15,5" Margin="5" Click="Filter_Click"/>
                <RadioButton Content="تسليمات اليوم" x:Name="BtnToday" Style="{StaticResource {x:Type ToggleButton}}" Padding="15,5" Margin="5" Click="Filter_Click"/>
                <RadioButton Content="تسليمات الأسبوع" x:Name="BtnWeek" Style="{StaticResource {x:Type ToggleButton}}" Padding="15,5" Margin="5" Click="Filter_Click"/>
            </StackPanel>
        </StackPanel>

        <ScrollViewer Grid.Row="2" VerticalScrollBarVisibility="Auto" Margin="10">
            <ItemsControl x:Name="CustomersItemsControl">
                <ItemsControl.ItemsPanel>
                    <ItemsPanelTemplate>
                        <WrapPanel HorizontalAlignment="Center"/>
                    </ItemsPanelTemplate>
                </ItemsControl.ItemsPanel>
                
                <ItemsControl.ItemTemplate>
                    <DataTemplate>
                        <Border Width="300" Margin="10" Background="White" CornerRadius="15" Padding="15">
                            <Border.Effect>
                                <DropShadowEffect BlurRadius="15" Direction="270" ShadowDepth="2" Opacity="0.1"/>
                            </Border.Effect>
                            <StackPanel>
                                <TextBlock Text="{Binding Name}" FontSize="20" FontWeight="Bold" Foreground="#2C3E50" Margin="0,0,0,5"/>
                                <Separator Background="#F1F1F1" Margin="0,5"/>
                                
                                <Grid Margin="0,5">
                                    <TextBlock Text="🗓 تاريخ الاستلام:" Foreground="#7F8C8D" HorizontalAlignment="Left"/>
                                    <TextBlock Text="{Binding DeliveryDate}" FontWeight="SemiBold" HorizontalAlignment="Right"/>
                                </Grid>

                                <Grid Margin="0,5">
                                    <TextBlock Text="💰 سعر الفستان:" Foreground="#7F8C8D" HorizontalAlignment="Left"/>
                                    <TextBlock Text="{Binding TotalPrice, StringFormat={}{0} ج.م}" FontWeight="SemiBold" HorizontalAlignment="Right"/>
                                </Grid>

                                <Grid Margin="0,5">
                                    <TextBlock Text="✅ المدفوع:" Foreground="#27AE60" HorizontalAlignment="Left"/>
                                    <TextBlock Text="{Binding Paid, StringFormat={}{0} ج.م}" FontWeight="SemiBold" Foreground="#27AE60" HorizontalAlignment="Right"/>
                                </Grid>

                                <Grid Margin="0,5">
                                    <TextBlock Text="🔴 المتبقي:" Foreground="#E74C3C" HorizontalAlignment="Left"/>
                                    <TextBlock Text="{Binding Remaining, StringFormat={}{0} ج.م}" FontWeight="Bold" Foreground="#E74C3C" HorizontalAlignment="Right"/>
                                </Grid>
                                
                                <Button Content="تعديل البيانات" Margin="0,10,0,0" Background="#3498DB" Foreground="White" BorderThickness="0" Height="30">
                                    <Button.Resources>
                                        <Style TargetType="Border">
                                            <Setter Property="CornerRadius" Value="5"/>
                                        </Style>
                                    </Button.Resources>
                                </Button>
                            </StackPanel>
                        </Border>
                    </DataTemplate>
                </ItemsControl.ItemTemplate>
            </ItemsControl>
        </ScrollViewer>
    </Grid>
</Window>

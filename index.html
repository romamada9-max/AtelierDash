<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الأتيليه - احمد حمزة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --main-color: #d81b60; --bg-color: #f4f7f6; --accent: #27ae60; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); margin: 0; padding: 10px; }
        
        /* شاشة تسجيل الدخول */
        #login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--main-color); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; }
        #login-overlay input { padding: 15px; border-radius: 10px; border: none; width: 80%; max-width: 300px; text-align: center; font-size: 18px; margin-bottom: 10px; }
        #login-overlay button { padding: 10px 30px; border-radius: 10px; border: none; background: white; color: var(--main-color); font-weight: bold; cursor: pointer; }

        /* الهيدر */
        .header { background: var(--main-color); color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; margin: -10px -10px 20px -10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* أدوات البحث والفلترة */
        .controls { background: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .search-box { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; outline: none; transition: 0.3s; text-align: center; }
        .search-box:focus { border-color: var(--main-color); }
        
        .filter-buttons { display: flex; gap: 5px; justify-content: space-between; }
        .filter-btn { flex: 1; padding: 10px 5px; border: none; border-radius: 8px; background: #eee; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .filter-btn.active { background: var(--main-color); color: white; }

        /* الكروت */
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-right: 5px solid var(--main-color); position: relative; }
        .customer-name { font-size: 18px; font-weight: bold; color: #333; }
        .detail { font-size: 14px; color: #666; margin: 5px 0; }
        .amount { color: var(--main-color); font-weight: bold; }
        .date-tag { display: inline-block; padding: 4px 8px; border-radius: 5px; background: #e8f5e9; color: #2e7d32; font-weight: bold; margin-top: 5px; }
        
        .card-actions { display: flex; gap: 10px; margin-top: 10px; }
        .action-btn { flex: 1; padding: 8px; border-radius: 5px; border: none; font-size: 12px; font-weight: bold; color: white; text-decoration: none; text-align: center; }
        .call-btn { background: #2196F3; }
        .wa-btn { background: #4CAF50; }

        .no-data { text-align: center; color: #999; margin-top: 20px; }
        #stats-bar { display: flex; justify-content: space-around; margin-bottom: 15px; font-size: 14px; color: #555; background: #fff; padding: 10px; border-radius: 10px; }
        
        /* إخفاء المحتوى قبل تسجيل الدخول */
        #main-content { display: none; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2 style="color: white;">أهلاً بك يا أبوحمزة</h2>
        <p style="color: white; font-size: 14px;">يرجى إدخال كلمة المرور للمتابعة</p>
        <input type="password" id="passInput" placeholder="كلمة المرور">
        <button onclick="checkPassword()">دخول</button>
    </div>

    <div id="main-content">
        <div class="header">
            <h2 style="margin:0">أتيليه احمد حمزة 👗</h2>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" class="search-box" placeholder="ابحث باسم العميلة أو رقم الهاتف...">
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterData('all', this)">الكل</button>
                <button class="filter-btn" onclick="filterData('today', this)">اليوم</button>
                <button class="filter-btn" onclick="filterData('week', this)">الأسبوع</button>
            </div>
        </div>

        <div id="stats-bar">
            <span>العميلات: <b id="count">0</b></span>
            <span>الإجمالي: <b id="totalRem">0</b> ج.م</span>
        </div>

        <div id="customer-list"></div>
    </div>

    <script>
        // --- نظام الحماية ---
        function checkPassword() {
            const pass = document.getElementById('passInput').value;
            const correctPass = "2606"; // يمكنك تغيير الرقم 1234 لأي باسورد تحبه
            
            if (pass === correctPass) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                startApp(); // بدء تحميل البيانات بعد الباسورد صح
            } else {
                alert("كلمة المرور غير صحيحة!");
            }
        }

        // --- نظام البيانات ---
        function startApp() {
            const firebaseConfig = { databaseURL: "https://ateliersystem-3ed22-default-rtdb.firebaseio.com" };
            if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
            const db = firebase.database();

            let allCustomers = [];
            let currentFilter = 'all';

            db.ref('LiveAtelier').on('value', (snapshot) => {
                allCustomers = [];
                if (snapshot.exists()) {
                    snapshot.forEach(child => { allCustomers.push(child.val()); });
                }
                renderData();
            });

            window.renderData = function() {
                const listContainer = document.getElementById('customer-list');
                const searchText = document.getElementById('searchInput').value.toLowerCase();
                listContainer.innerHTML = '';
                
                let count = 0;
                let totalRemaining = 0;

                const filtered = allCustomers.filter(c => {
                    const matchSearch = (c.CustomerName || "").toLowerCase().includes(searchText) || (c.Phone || "").includes(searchText);
                    if (!matchSearch) return false;
                    if (currentFilter === 'all') return true;

                    const deliveryDate = new Date(c.DeliveryDate);
                    const today = new Date();
                    today.setHours(0,0,0,0);

                    if (currentFilter === 'today') return deliveryDate.toDateString() === today.toDateString();
                    if (currentFilter === 'week') {
                        const nextWeek = new Date();
                        nextWeek.setDate(today.getDate() + 7);
                        return deliveryDate >= today && deliveryDate <= nextWeek;
                    }
                });

                filtered.forEach(data => {
                    count++;
                    totalRemaining += parseFloat(data.Remaining) || 0;
                    listContainer.innerHTML += `
                        <div class="card">
                            <div class="customer-name">${data.CustomerName}</div>
                            <div class="detail">📞 ${data.Phone}</div>
                            <div class="detail">💰 المتبقي: <span class="amount">${data.Remaining} ج.م</span></div>
                            <div class="date-tag">📅 موعد التسليم: ${data.DeliveryDate}</div>
                            <div class="card-actions">
                                <a href="tel:${data.Phone}" class="action-btn call-btn">اتصال 📞</a>
                                <a href="https://wa.me/2${data.Phone}" class="action-btn wa-btn">واتساب 💬</a>
                            </div>
                        </div>`;
                });

                document.getElementById('count').innerText = count;
                document.getElementById('totalRem').innerText = totalRemaining.toLocaleString();
                if (filtered.length === 0) listContainer.innerHTML = '<div class="no-data">لا توجد نتائج مطابقة</div>';
            };

            window.filterData = function(type, btn) {
                currentFilter = type;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderData();
            };

            document.getElementById('searchInput').oninput = renderData;
        }
    </script>
</body>
</html>

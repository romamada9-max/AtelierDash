<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول | أتيليه أحمد حمزة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fce4ec; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 12px; border: none; background: #d81b60; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #dashboard { display: none; width: 100%; height: 100vh; background: #f8f9fa; position: absolute; top: 0; left: 0; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="loginPage" class="login-box">
        <h2 style="color:#d81b60">دخول الإدارة</h2>
        <input type="password" id="passInput" placeholder="أدخل كلمة المرور">
        <button onclick="checkPass()">دخول</button>
        <p id="errMsg" style="color:red; font-size:12px; display:none;">كلمة المرور غير صحيحة!</p>
    </div>

    <div id="dashboard">
        <iframe src="about:blank" id="contentFrame" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>

    <script>
        function checkPass() {
            const pass = document.getElementById('passInput').value;
            // --- اختر الباسورد اللي يعجبك هنا ---
            if (pass === "260686") { 
                document.getElementById('loginPage').style.display = "none";
                document.getElementById('dashboard').style.display = "block";
                loadDashboard();
            } else {
                document.getElementById('errMsg').style.display = "block";
            }
        }

        function loadDashboard() {
            // هنا بنشغل كود الـ Firebase والبحث
            // ملاحظة: للأمان التام بكرة هنخلي الـ Firebase يطلب توثيق رسمي
            console.log("تم تسجيل الدخول بنجاح");
        }
    </script>
</body>
</html>
